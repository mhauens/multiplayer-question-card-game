  <path d="M75 35 Q80 20 90 15 Q85 18 82 25 Q88 15 95 12 Q88 20 85 28 Q90 20 97 18 Q90 25 85 32 L78 38" stroke="currentColor" stroke-width="2" fill="none"/>
